<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="clawGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#1f6feb"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#58a6ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="subtleglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#21262d" stroke-width="1" opacity="0.6">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1280" height="3" fill="url(#accentGrad)"/>

  <!-- Claw mark icon (left side) -->
  <g transform="translate(120, 180)" filter="url(#glow)">
    <!-- Three claw slashes -->
    <path d="M 60 0 C 80 40 90 90 70 160" stroke="url(#clawGrad)" stroke-width="18" stroke-linecap="round" fill="none"/>
    <path d="M 100 10 C 115 50 120 100 100 170" stroke="url(#clawGrad)" stroke-width="18" stroke-linecap="round" fill="none" opacity="0.85"/>
    <path d="M 140 20 C 150 60 150 110 130 180" stroke="url(#clawGrad)" stroke-width="18" stroke-linecap="round" fill="none" opacity="0.7"/>
    <!-- Claw tips -->
    <ellipse cx="60" cy="0" rx="10" ry="10" fill="#58a6ff"/>
    <ellipse cx="100" cy="10" rx="10" ry="10" fill="#58a6ff" opacity="0.85"/>
    <ellipse cx="140" cy="20" rx="10" ry="10" fill="#58a6ff" opacity="0.7"/>
  </g>

  <!-- Main title -->
  <text x="360" y="260"
    font-family="'SF Mono', 'Fira Code', 'Consolas', monospace"
    font-size="88"
    font-weight="700"
    fill="#f0f6fc"
    filter="url(#subtleglow)">OpenClaw</text>

  <!-- Subtitle -->
  <text x="362" y="330"
    font-family="'SF Mono', 'Fira Code', 'Consolas', monospace"
    font-size="42"
    font-weight="400"
    fill="#58a6ff"
    letter-spacing="6">Quickstart</text>

  <!-- Divider -->
  <rect x="360" y="358" width="560" height="2" fill="#30363d"/>

  <!-- Tagline -->
  <text x="362" y="410"
    font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="28"
    fill="#8b949e">Your AI. Your machine. Your rules.</text>

  <!-- Bottom pill badges -->
  <!-- Docker badge -->
  <rect x="362" y="450" width="140" height="40" rx="20" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="432" y="476"
    font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="18" fill="#58a6ff" text-anchor="middle">Docker</text>

  <!-- Self-hosted badge -->
  <rect x="516" y="450" width="180" height="40" rx="20" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="606" y="476"
    font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="18" fill="#3fb950" text-anchor="middle">Self-hosted</text>

  <!-- AI Gateway badge -->
  <rect x="710" y="450" width="180" height="40" rx="20" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="800" y="476"
    font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="18" fill="#d2a8ff" text-anchor="middle">AI Gateway</text>

  <!-- Right side: terminal snippet -->
  <rect x="820" y="170" width="380" height="240" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <!-- Terminal dots -->
  <circle cx="846" cy="196" r="7" fill="#ff5f57"/>
  <circle cx="868" cy="196" r="7" fill="#febc2e"/>
  <circle cx="890" cy="196" r="7" fill="#28c840"/>
  <!-- Terminal text -->
  <text x="840" y="235" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="16" fill="#8b949e">$</text>
  <text x="858" y="235" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="16" fill="#f0f6fc">docker compose up -d</text>
  <text x="840" y="265" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="16" fill="#8b949e">$</text>
  <text x="858" y="265" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="16" fill="#f0f6fc">docker compose logs</text>
  <text x="840" y="300" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="14" fill="#3fb950">[gateway] listening on</text>
  <text x="840" y="320" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="14" fill="#3fb950">  ws://0.0.0.0:18789</text>
  <text x="840" y="355" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="16" fill="#8b949e">$</text>
  <text x="858" y="355" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="16" fill="#f0f6fc">open http://127.0.0.1<tspan fill="#58a6ff">:18789</tspan></text>
  <!-- Blinking cursor -->
  <rect x="858" y="370" width="10" height="18" fill="#58a6ff" opacity="0.8"/>

  <!-- Bottom border -->
  <rect x="0" y="637" width="1280" height="3" fill="url(#accentGrad)"/>
</svg>
